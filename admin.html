<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Click to Care</title>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen bg-gray-50 font-mitr">
  <!-- Login -->
  <div id="loginBox" class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl p-6 shadow-xl max-w-sm w-full">
      <h1 class="text-2xl font-semibold text-center text-sky-600 mb-4">🔐 Admin Login</h1>
      <input id="username" placeholder="Username" class="w-full p-3 border rounded-xl mb-3">
      <input id="password" type="password" placeholder="Password" class="w-full p-3 border rounded-xl mb-3">
      <button id="btnLogin" class="w-full py-3 bg-sky-500 text-white rounded-xl">เข้าสู่ระบบ</button>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" style="display:none">
    <header class="bg-white shadow p-4 flex justify-between items-center">
      <h1 class="text-xl font-semibold text-sky-700">📊 Admin Dashboard</h1>
      <button id="btnLogout" class="text-red-500">ออกจากระบบ</button>
    </header>

    <main class="p-4 max-w-6xl mx-auto">
      <!-- Cards -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
        <div class="bg-white p-4 rounded-xl shadow"><p class="text-sm text-gray-500">วันนี้</p><p id="statToday" class="text-2xl font-semibold text-sky-600">0</p></div>
        <div class="bg-white p-4 rounded-xl shadow"><p class="text-sm text-gray-500">ทั้งหมด</p><p id="statAll" class="text-2xl font-semibold text-gray-700">0</p></div>
        <div class="bg-white p-4 rounded-xl shadow"><p class="text-sm text-gray-500">รอรับบริการ</p><p id="statPending" class="text-2xl font-semibold text-yellow-600">0</p></div>
        <div class="bg-white p-4 rounded-xl shadow"><p class="text-sm text-gray-500">ยกเลิก</p><p id="statCancel" class="text-2xl font-semibold text-red-500">0</p></div>
      </div>

      <!-- Filters -->
      <div class="bg-white p-4 rounded-xl shadow mb-4 grid grid-cols-1 md:grid-cols-4 gap-3">
        <input id="searchInput" placeholder="🔍 ค้นหา ชื่อ/เบอร์/บริการ" class="p-2 border rounded-lg">
        <input id="filterDate" type="date" class="p-2 border rounded-lg">
        <select id="filterStatus" class="p-2 border rounded-lg">
          <option value="">-- ทุกสถานะ --</option>
          <option value="pending">รอรับบริการ</option>
          <option value="completed">รับบริการแล้ว</option>
          <option value="cancelled">ยกเลิก</option>
          <option value="no_show">ไม่มาตามนัด</option>
        </select>
        <button id="btnExport" class="bg-emerald-500 text-white p-2 rounded-lg">📥 Export CSV</button>
      </div>

      <!-- Table -->
      <div class="bg-white rounded-xl shadow overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-100">
            <tr>
              <th class="p-2 text-left">ชื่อ</th>
              <th class="p-2">อายุ</th>
              <th class="p-2">เบอร์</th>
              <th class="p-2">บริการ</th>
              <th class="p-2">วันที่</th>
              <th class="p-2">เวลา</th>
              <th class="p-2">สถานะ</th>
              <th class="p-2">จัดการ</th>
            </tr>
          </thead>
          <tbody id="bookingTable"></tbody>
        </table>
      </div>
    </main>
  </div>

  <div id="loadingOverlay" class="fixed inset-0 bg-black/40 z-50 hidden items-center justify-center" style="display:none">
    <div class="bg-white rounded-2xl p-6">กำลังโหลด...</div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
