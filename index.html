<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click to Care - คลินิกวัยรุ่น รพ.นิคมคำสร้อย</title>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<!-- เพิ่ม LIFF SDK -->
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-sky-50 via-white to-emerald-50 font-mitr">
  <div class="max-w-md mx-auto px-4 py-8 min-h-screen flex flex-col">
    <div class="text-center mb-8 mt-8">
      <div class="text-6xl mb-4">💙</div>
      <h1 class="text-3xl font-semibold text-sky-600 mb-2">Click to Care</h1>
      <p class="text-gray-700 font-medium">ระบบจองคิวออนไลน์</p>
      <p class="text-sm text-gray-600">คลินิกวัยรุ่น โรงพยาบาลนิคมคำสร้อย</p>
      <p class="mt-4 text-emerald-600 italic">"จองง่าย ปรึกษาไว ใส่ใจทุกความลับของวัยรุ่น"</p>
      
      <!-- แสดงชื่อผู้ใช้ LINE -->
      <p id="welcomeUser" class="mt-3 text-sm text-gray-500" style="display:none">
        สวัสดีคุณ <span id="userName" class="font-medium text-sky-600"></span> 👋
      </p>
    </div>

    <div class="space-y-4 flex-1">
      <a href="booking.html" class="block w-full py-5 bg-gradient-to-r from-sky-500 to-emerald-500 text-white text-center text-lg font-medium rounded-2xl shadow-lg hover:shadow-xl transition">
        📅 จองคิวรับบริการ
      </a>
      <a href="my-booking.html" class="block w-full py-5 bg-white text-sky-600 border-2 border-sky-400 text-center text-lg font-medium rounded-2xl shadow hover:shadow-lg transition">
        🔍 ตรวจสอบ/ยกเลิกคิวของฉัน
      </a>
    </div>

    <div class="text-center text-xs text-gray-400 mt-8 pb-4">
      © 2026 โรงพยาบาลนิคมคำสร้อย
    </div>
  </div>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="fixed inset-0 bg-black/40 z-50 items-center justify-center" style="display:flex">
    <div class="bg-white rounded-2xl p-6 flex items-center gap-3">
      <div class="animate-spin h-6 w-6 border-4 border-sky-500 border-t-transparent rounded-full"></div>
      <span>กำลังเตรียมระบบ...</span>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/liff.js"></script>
  <script>
    // เริ่มต้น LIFF ที่หน้าแรกเลย
    (async function() {
      const ok = await LiffHelper.init();
      Utils.showLoading(false);
      
      if (ok && LiffHelper.user.displayName) {
        document.getElementById('welcomeUser').style.display = 'block';
        document.getElementById('userName').textContent = LiffHelper.user.displayName;
      }
    })();
  </script>
</body>
</html>
